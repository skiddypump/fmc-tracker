<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sales Log">
<title>Field Sales Log</title>
<style>
  :root{
    --bg:#1E2126;
    --bg-panel:#262A31;
    --bg-panel-2:#2C3138;
    --text:#F0EBE0;
    --text-dim:#9AA1AC;
    --accent:#E8A33D;
    --accent-dim:#8A6B34;
    --accent-2:#5D8AB0;
    --success:#6B9B6E;
    --border:#383D45;
    --ticket-bg:#F0EBE0;
    --ticket-text:#23262B;
    --ticket-text-dim:#6B6558;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);width:100%;min-height:100dvh;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;
    line-height:1.4;
    padding:calc(var(--safe-top) + 18px) 16px calc(var(--safe-bottom) + 40px);
  }
  .mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;}
  button{font-family:inherit;-webkit-appearance:none;appearance:none;}
  input:not([type="checkbox"]):not([type="radio"]), select{font-family:inherit;-webkit-appearance:none;appearance:none;}
  input[type="checkbox"]{-webkit-appearance:auto;appearance:auto;}

  /* ===== MOBILE-FIRST BASE (target: iPhone-width screens) ===== */

  header{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
    border-bottom:2px solid var(--accent);
    padding-bottom:16px;
    margin-bottom:20px;
  }
  .brand-mark{display:flex;align-items:center;gap:12px;}
  .brand-mark .swatch{
    width:42px;height:42px;background:var(--accent);border-radius:9px;
    display:flex;align-items:center;justify-content:center;color:#20242A;
    font-weight:800;font-size:17px;transform:rotate(-3deg);flex-shrink:0;
  }
  h1{font-size:22px;letter-spacing:0.03em;text-transform:uppercase;font-weight:800;margin:0;line-height:1.2;}
  .subtitle{color:var(--text-dim);font-size:13px;margin-top:3px;}
  .stamp{font-size:12.5px;color:var(--text-dim);line-height:1.5;}
  .stamp b{color:var(--accent);}

  .panel{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px 16px;
    margin-bottom:18px;
  }
  .panel h2{
    font-size:13px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--accent);margin:0 0 14px 0;display:flex;align-items:center;gap:8px;
  }
  .panel h2::before{content:"";width:9px;height:9px;background:var(--accent);display:inline-block;transform:rotate(45deg);flex-shrink:0;}

  .btn{
    background:var(--accent);color:#20242A;border:none;font-weight:800;
    text-transform:uppercase;letter-spacing:0.04em;font-size:14px;
    padding:14px 20px;border-radius:10px;cursor:pointer;
    min-height:48px;
  }
  .btn:hover{background:#f0b256;}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:0.5;cursor:default;}
  .btn.secondary{background:var(--bg-panel-2);color:var(--text);border:1px solid var(--border);}
  .btn.secondary:hover{background:#343a42;}
  .btn.small{padding:11px 14px;font-size:12px;min-height:40px;}
  .btn.ghost{background:none;border:1px solid var(--border);color:var(--text-dim);}
  .btn.ghost:hover{color:var(--text);border-color:var(--accent);}

  /* ---------- HOME / EVENT LIST ---------- */
  .top-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .top-actions button{flex:1 1 auto;}
  .top-actions #newEventBtn{flex:1 1 100%;order:-1;}

  .new-event-form{display:flex;flex-direction:column;gap:12px;}
  .field label{
    display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text-dim);margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;background:var(--bg-panel-2);border:1px solid var(--border);
    border-radius:9px;color:var(--text);padding:13px 12px;font-size:16px;font-family:inherit;
    min-height:46px;
  }
  .field input:focus, .field select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .new-event-form .btn{width:100%;}

  .event-list{display:flex;flex-direction:column;gap:12px;}
  .event-card{
    background:var(--ticket-bg);color:var(--ticket-text);border-radius:12px;
    display:flex;align-items:stretch;overflow:hidden;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);border:none;text-align:left;width:100%;padding:0;
  }
  .event-card:active{transform:scale(0.99);}
  .event-card .stub{width:12px;flex-shrink:0;background:var(--accent);}
  .event-card .body{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .event-card .name{font-weight:800;font-size:16.5px;text-transform:uppercase;letter-spacing:0.01em;line-height:1.25;}
  .event-card .date{font-size:12px;color:var(--ticket-text-dim);margin-top:3px;}
  .event-card .total{font-size:26px;font-weight:800;color:#8A6B34;}
  .event-card .count{font-size:12px;color:var(--ticket-text-dim);}
  .empty-note{color:var(--text-dim);font-size:13.5px;padding:6px 0;}

  /* ---------- EVENT DETAIL ---------- */
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .event-title{display:flex;flex-direction:column;gap:4px;}
  .event-title h1{font-size:20px;}
  .event-title .date-badge{font-size:12.5px;color:var(--text-dim);}

  .cards{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .card{
    background:var(--bg-panel);border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:12px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;
  }
  .card:nth-child(2){border-left-color:var(--accent-2);}
  .card:nth-child(3){border-left-color:var(--success);}
  .card .label{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);}
  .card .value{font-size:26px;font-weight:800;}

  .counter-row{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .counter{
    background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;display:flex;justify-content:space-between;align-items:center;
  }
  .counter .c-label{font-size:12.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);}
  .counter .c-value{font-size:32px;font-weight:800;margin-top:2px;}
  .counter .c-btns{display:flex;align-items:center;gap:10px;}
  .plus-btn{
    background:var(--accent);color:#20242A;border:none;border-radius:12px;
    width:54px;height:54px;font-size:24px;font-weight:800;cursor:pointer;line-height:1;
  }
  .plus-btn:active{transform:scale(0.94);}
  .minus-btn{
    background:var(--bg-panel-2);color:var(--text-dim);border:1px solid var(--border);border-radius:12px;
    width:40px;height:40px;font-size:17px;cursor:pointer;line-height:1;
  }

  /* item-entry rows: stacked cards on mobile */
  .stage-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--bg-panel-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
  }
  .stage-row .field{margin:0;}
  .stage-row .row-btn-group{display:flex;gap:8px;}
  .row-btn{
    flex:1;
    background:var(--bg);border:1px solid var(--border);color:var(--text-dim);
    border-radius:9px;padding:12px 10px;font-size:13px;cursor:pointer;min-height:44px;
  }
  .row-btn.remove:active{color:#d9776b;border-color:#d9776b;}
  .stage-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .stage-actions .btn{width:100%;}
  .form-msg{font-size:13px;color:var(--text-dim);text-align:center;}
  .form-msg.error{color:#d9776b;}

  .entry-datetime-row{display:flex;gap:10px;margin-bottom:14px;}
  .entry-datetime-row .field{flex:1;margin:0;}

  .promo-check{
    display:flex;align-items:center;gap:10px;
    padding:6px 2px;
  }
  .promo-check input[type="checkbox"]{
    width:24px;height:24px;accent-color:var(--accent);flex-shrink:0;
  }
  .promo-check label{font-size:13.5px;color:var(--text-dim);}

  /* logged items: one ticket = one entry, containing multiple item lines */
  .tickets{display:flex;flex-direction:column;gap:10px;}
  .ticket{
    background:var(--ticket-bg);color:var(--ticket-text);border-radius:12px;
    display:flex;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.3);overflow:hidden;
  }
  .ticket .stub-left{width:12px;flex-shrink:0;background:var(--accent);align-self:stretch;}
  .ticket .stub-body{flex:1;padding:14px 16px;min-width:0;}

  .entry-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .entry-header .e-datetime{font-weight:800;font-size:14.5px;}
  .entry-header .e-meta{font-size:11.5px;color:var(--ticket-text-dim);margin-top:2px;}
  .entry-header .e-total{font-weight:800;font-size:16px;white-space:nowrap;}
  .entry-del-btn{
    background:none;border:none;color:#b5aa8f;font-size:13px;cursor:pointer;
    padding:6px;line-height:1;flex-shrink:0;
  }
  .entry-del-btn:active{color:#8a2f2f;}

  .item-line{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:9px 0;border-top:1px dashed #cfc7b4;
  }
  .item-line:first-of-type{border-top:1px solid #cfc7b4;margin-top:8px;padding-top:11px;}
  .item-line .i-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
  .item-line .i-name{font-weight:700;font-size:14.5px;overflow-wrap:anywhere;}
  .item-line .promo-badge{font-size:14px;flex-shrink:0;}
  .item-line .cat-pill{
    display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;
    padding:2px 6px;border-radius:4px;font-weight:800;flex-shrink:0;
  }
  .item-line.tools .cat-pill{background:var(--accent);color:#20242A;}
  .item-line.outdoor .cat-pill{background:var(--accent-2);color:#101820;}
  .item-line .i-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .item-line .i-value{font-weight:800;font-size:14.5px;min-width:56px;text-align:right;}
  .icon-btn{
    background:none;border:1px solid #cfc7b4;color:#6B6558;border-radius:8px;
    width:32px;height:32px;font-size:13px;cursor:pointer;line-height:1;flex-shrink:0;
  }
  .icon-btn.del:active{border-color:#8a2f2f;color:#8a2f2f;}

  .day-heading{font-size:11.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:16px 0 8px;}
  .day-heading:first-child{margin-top:0;}

  /* danger zone: isolated + visually distinct so it can't be hit while logging entries */
  .danger-zone{
    border:1.5px solid rgba(163,63,56,0.4);
    border-radius:14px;
    padding:16px;
    margin-top:36px;
    background:rgba(163,63,56,0.06);
  }
  .danger-zone .dz-label{
    font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;
    color:#c96a5f;margin-bottom:10px;
  }
  .delete-event-btn{
    width:100%;background:transparent;border:1.5px solid #a33f38;color:#d9776b;
    font-weight:800;text-transform:uppercase;letter-spacing:0.05em;font-size:13px;
    padding:14px;border-radius:10px;cursor:pointer;min-height:48px;
  }
  .delete-event-btn:active{background:rgba(163,63,56,0.15);}

  footer{text-align:center;color:var(--text-dim);font-size:11.5px;margin-top:26px;padding:0 4px;}

  /* ===== DESKTOP / WIDER SCREEN ENHANCEMENTS ===== */
  @media (min-width:700px){
    body{max-width:920px;margin:0 auto;padding-left:20px;padding-right:20px;}
    header{flex-direction:row;justify-content:space-between;align-items:flex-end;}
    .stamp{text-align:right;}

    .top-actions{justify-content:flex-end;}
    .top-actions button{flex:0 0 auto;}
    .top-actions #newEventBtn{flex:0 0 auto;order:initial;}

    .new-event-form{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end;}
    .new-event-form .btn{width:auto;}

    .event-card .body{flex-direction:row;justify-content:space-between;align-items:center;}
    .event-card .total{text-align:right;}
    .event-card .count{text-align:right;}

    .cards{flex-direction:row;}
    .card{flex-direction:column;align-items:flex-start;flex:1;}

    .counter-row{flex-direction:row;}
    .counter{flex:1;}

    .stage-row{
      flex-direction:row;
      align-items:end;
      flex-wrap:wrap;
    }
    .stage-row .field{flex:1 1 130px;}
    .stage-row .row-btn-group{flex:0 0 auto;}
    .row-btn{min-width:44px;}

    .stage-actions{flex-direction:row;justify-content:space-between;align-items:center;}
    .stage-actions .btn{width:auto;}
    .stage-actions-left{display:flex;gap:10px;}

    .ticket .stub-body{flex-direction:row;justify-content:space-between;align-items:center;}
    .ticket .t-right{gap:4px;}
  }
</style>
</head>
<body>

<div id="app"></div>

<footer>Data is saved in this browser on this device only. Use "Export backup" regularly in case you clear browser data or switch phones.</footer>

<script>
(function(){
  const STORAGE_KEY = 'sales-events';
  let events = [];
  let view = 'home'; // 'home' | 'event'
  let currentEventId = null;
  let staging = null; // { date, time, rows: [...] }
  let showNewEventForm = false;

  const app = document.getElementById('app');

  function pad(n){ return String(n).padStart(2,'0'); }
  function todayStr(){
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function nowTimeStr(){
    const d = new Date();
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function fmtMoney(n){
    return '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
  }
  function fmtTime(t){
    if(!t) return '';
    const [h,m] = t.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${pad(m)} ${period}`;
  }
  function catClass(cat){ return cat === 'Outdoor Power' ? 'outdoor' : 'tools'; }
  function uid(){ return Date.now() + '-' + Math.random().toString(36).slice(2,7); }

  function loadEvents(){
    try{
      const raw = window.localStorage.getItem(STORAGE_KEY);
      events = raw ? JSON.parse(raw) : [];
      events.forEach(migrateEvent);
    }catch(e){
      console.error('Could not read saved data', e);
      events = [];
    }
    render();
  }

  // migrate old "one item = one date/time" records into the new
  // "one entry (date/time) holds multiple items" structure, so existing
  // saved data isn't lost when the data model changes.
  function migrateEvent(ev){
    if(ev.entries) return;
    ev.entries = (ev.items || []).map(it => ({
      id: it.id || uid(),
      date: it.date,
      time: it.time,
      items: [{ id: uid(), category: it.category, itemName: it.itemName, value: it.value, promo: false }]
    }));
    delete ev.items;
  }

  function saveEvents(){
    try{
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }catch(e){
      console.error('Could not save data', e);
      alert('Could not save your data. Your browser storage may be full or disabled (e.g. private/incognito mode).');
    }
  }

  function blankItemRow(){
    return { id: uid(), category: 'Tools', itemName: '', value: '', promo: false };
  }

  function freshStaging(){
    return { date: todayStr(), time: nowTimeStr(), rows: [ blankItemRow() ] };
  }

  function eventTotal(ev){
    return (ev.entries||[]).reduce((s,en)=> s + en.items.reduce((s2,i)=>s2+i.value,0), 0);
  }

  function openEvent(ev){
    currentEventId = ev.id;
    view = 'event';
    staging = freshStaging();
  }

  /* ---------------- HOME ---------------- */
  function renderHome(){
    app.innerHTML = `
      <header>
        <div class="brand-mark">
          <div class="swatch">FS</div>
          <div>
            <h1>Field Sales Log</h1>
            <div class="subtitle">Event-based retail activity tracker</div>
          </div>
        </div>
        <div class="stamp">Status: <b>${events.length} event${events.length===1?'':'s'} logged</b></div>
      </header>

      <div class="top-actions">
        <button class="btn secondary small" id="exportBtn">Export backup</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
        <button class="btn secondary small" id="importBtn">Import backup</button>
        <button class="btn" id="newEventBtn">+ Create Event</button>
      </div>

      ${showNewEventForm ? `
        <div class="panel">
          <h2>New event</h2>
          <div class="new-event-form">
            <div class="field">
              <label for="ne-name">Event name</label>
              <input type="text" id="ne-name" placeholder="e.g. Home Depot #4021 — Spring Demo Day">
            </div>
            <div class="field">
              <label for="ne-date">Date</label>
              <input type="date" id="ne-date" value="${todayStr()}">
            </div>
            <button class="btn" id="createEventBtn">Create</button>
            <button class="btn secondary" id="cancelEventBtn">Cancel</button>
          </div>
        </div>
      ` : ''}

      <div class="panel">
        <h2>Events</h2>
        <div class="event-list">
          ${events.length === 0
            ? '<div class="empty-note">No events yet — create one to start logging sales.</div>'
            : events.slice().sort((a,b)=> b.date.localeCompare(a.date)).map(e => {
                const itemCount = (e.entries||[]).reduce((s,en)=>s+en.items.length,0);
                return `
              <button class="event-card" data-id="${e.id}">
                <div class="stub"></div>
                <div class="body">
                  <div>
                    <div class="name">${escapeHtml(e.name)}</div>
                    <div class="date">${e.date} · ${itemCount} item${itemCount===1?'':'s'}</div>
                  </div>
                  <div>
                    <div class="total mono">${fmtMoney(eventTotal(e))}</div>
                    <div class="count">${e.assocCount||0} assoc · ${e.custCount||0} cust sessions</div>
                  </div>
                </div>
              </button>
            `;}).join('')
          }
        </div>
      </div>
    `;

    document.getElementById('newEventBtn').addEventListener('click', () => {
      showNewEventForm = !showNewEventForm;
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const d = new Date();
      a.href = url;
      a.download = `field-sales-log-backup-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const imported = JSON.parse(reader.result);
          if(!Array.isArray(imported)) throw new Error('Invalid file');
          const merge = confirm(`Import ${imported.length} event(s)?\n\nOK = merge with existing data\nCancel = replace existing data entirely`);
          if(merge){
            imported.forEach(ie => {
              if(!events.find(e => e.id === ie.id)) events.push(ie);
            });
          } else {
            events = imported;
          }
          saveEvents();
          render();
        }catch(err){
          alert('Could not read that file — make sure it\'s a backup exported from this app.');
        }
        e.target.value = '';
      };
      reader.readAsText(file);
    });

    if(showNewEventForm){
      document.getElementById('createEventBtn').addEventListener('click', () => {
        const name = document.getElementById('ne-name').value.trim();
        const date = document.getElementById('ne-date').value;
        if(!name){ document.getElementById('ne-name').focus(); return; }
        const ev = { id: uid(), name, date: date || todayStr(), assocCount:0, custCount:0, entries: [] };
        events.push(ev);
        saveEvents();
        showNewEventForm = false;
        openEvent(ev);
        render();
      });
      document.getElementById('cancelEventBtn').addEventListener('click', () => {
        showNewEventForm = false;
        render();
      });
    }

    app.querySelectorAll('.event-card').forEach(card => {
      card.addEventListener('click', () => {
        const ev = events.find(e => e.id === card.getAttribute('data-id'));
        if(ev) openEvent(ev);
        render();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function escapeAttr(str){
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  }

  /* ---------------- EVENT DETAIL ---------------- */
  function renderEvent(){
    const ev = events.find(e => e.id === currentEventId);
    if(!ev){ view = 'home'; render(); return; }
    if(!ev.entries) ev.entries = [];

    const allItems = ev.entries.flatMap(en => en.items);
    const totalAll = allItems.reduce((s,i)=>s+i.value,0);
    const totalTools = allItems.filter(i=>i.category==='Tools').reduce((s,i)=>s+i.value,0);
    const totalOutdoor = allItems.filter(i=>i.category==='Outdoor Power').reduce((s,i)=>s+i.value,0);
    const itemCount = allItems.length;

    app.innerHTML = `
      <div class="back-row">
        <button class="btn ghost small" id="backBtn">&larr; All events</button>
      </div>
      <header>
        <div class="event-title">
          <h1>${escapeHtml(ev.name)}</h1>
          <span class="date-badge">${ev.date}</span>
        </div>
        <div class="stamp">Status: <b>${itemCount} item${itemCount===1?'':'s'} logged</b></div>
      </header>

      <div class="cards">
        <div class="card"><div class="label">Total $</div><div class="value mono">${fmtMoney(totalAll)}</div></div>
        <div class="card"><div class="label">Total Tool $</div><div class="value mono">${fmtMoney(totalTools)}</div></div>
        <div class="card"><div class="label">Total Outdoor $</div><div class="value mono">${fmtMoney(totalOutdoor)}</div></div>
      </div>

      <div class="counter-row">
        <div class="counter">
          <div>
            <div class="c-label">Associate sessions</div>
            <div class="c-value mono">${ev.assocCount||0}</div>
          </div>
          <div class="c-btns">
            <button class="plus-btn" id="assocPlus">+</button>
            <button class="minus-btn" id="assocMinus">−</button>
          </div>
        </div>
        <div class="counter">
          <div>
            <div class="c-label">Customer sessions</div>
            <div class="c-value mono">${ev.custCount||0}</div>
          </div>
          <div class="c-btns">
            <button class="plus-btn" id="custPlus">+</button>
            <button class="minus-btn" id="custMinus">−</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Add items</h2>
        <div class="entry-datetime-row">
          <div class="field"><label>Entry date</label><input type="date" id="stg-date" value="${staging.date}"></div>
          <div class="field"><label>Entry time</label><input type="time" id="stg-time" value="${staging.time}"></div>
        </div>
        <div id="stagingArea">
          ${staging.rows.map((row, idx) => stageRowHtml(row, idx)).join('')}
        </div>
        <div class="stage-actions">
          <div class="stage-actions-left">
            <button class="btn secondary small" id="addItemBtn">+ Add item</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:stretch;gap:8px;">
            <span class="form-msg" id="formMsg"></span>
            <button class="btn" id="logEntryBtn">Log entry</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Logged items</h2>
        <div class="tickets" id="ticketList">
          ${ev.entries.length === 0 ? '<div class="empty-note">No items logged yet for this event.</div>' : renderEntryTickets(ev.entries)}
        </div>
      </div>

      <div class="danger-zone">
        <div class="dz-label">Danger zone</div>
        <button class="delete-event-btn" id="deleteEventBtn">Delete this event</button>
      </div>
    `;

    document.getElementById('backBtn').addEventListener('click', () => {
      view = 'home';
      render();
    });

    document.getElementById('assocPlus').addEventListener('click', () => { ev.assocCount = (ev.assocCount||0)+1; saveEvents(); render(); });
    document.getElementById('assocMinus').addEventListener('click', () => { ev.assocCount = Math.max(0,(ev.assocCount||0)-1); saveEvents(); render(); });
    document.getElementById('custPlus').addEventListener('click', () => { ev.custCount = (ev.custCount||0)+1; saveEvents(); render(); });
    document.getElementById('custMinus').addEventListener('click', () => { ev.custCount = Math.max(0,(ev.custCount||0)-1); saveEvents(); render(); });

    document.getElementById('stg-date').addEventListener('input', e => staging.date = e.target.value);
    document.getElementById('stg-time').addEventListener('input', e => staging.time = e.target.value);

    staging.rows.forEach((row, idx) => {
      const prefix = `sr-${idx}-`;
      document.getElementById(prefix+'category').addEventListener('change', e => row.category = e.target.value);
      document.getElementById(prefix+'name').addEventListener('input', e => row.itemName = e.target.value);
      document.getElementById(prefix+'value').addEventListener('input', e => row.value = e.target.value);
      document.getElementById(prefix+'promo').addEventListener('change', e => row.promo = e.target.checked);
      document.getElementById(prefix+'dup').addEventListener('click', () => {
        staging.rows.splice(idx+1, 0, { id: uid(), category: row.category, itemName: row.itemName, value: row.value, promo: row.promo });
        render();
      });
      const removeBtn = document.getElementById(prefix+'remove');
      if(removeBtn){
        removeBtn.addEventListener('click', () => {
          staging.rows.splice(idx,1);
          if(staging.rows.length===0) staging.rows.push(blankItemRow());
          render();
        });
      }
    });

    document.getElementById('addItemBtn').addEventListener('click', () => {
      staging.rows.push(blankItemRow());
      render();
    });

    document.getElementById('logEntryBtn').addEventListener('click', () => {
      const valid = staging.rows.filter(r => r.itemName.trim());
      if(valid.length === 0){
        showMsg('Add at least one item with a name.', true);
        return;
      }
      if(!staging.date){
        showMsg('Add a date for this entry.', true);
        return;
      }
      const entry = {
        id: uid(),
        date: staging.date,
        time: staging.time,
        items: valid.map(r => ({
          id: uid(),
          category: r.category,
          itemName: r.itemName.trim(),
          value: parseFloat(r.value) || 0,
          promo: !!r.promo
        }))
      };
      ev.entries.push(entry);
      ev.entries.sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));
      saveEvents();
      staging = freshStaging();
      showMsg(`Logged ${valid.length} item${valid.length===1?'':'s'}.`, false);
      render();
    });

    // duplicate a logged item into the staging area
    app.querySelectorAll('.icon-btn.dup').forEach(btn => {
      btn.addEventListener('click', () => {
        const entryId = btn.getAttribute('data-entry-id');
        const itemId = btn.getAttribute('data-item-id');
        const entry = ev.entries.find(en => en.id === entryId);
        const item = entry && entry.items.find(i => i.id === itemId);
        if(!item) return;
        staging.rows.push({ id: uid(), category: item.category, itemName: item.itemName, value: String(item.value), promo: item.promo });
        render();
        const stageEl = document.getElementById('stagingArea');
        if(stageEl) stageEl.scrollIntoView({ behavior:'smooth', block:'center' });
      });
    });

    // delete a single item from a logged entry (removes entry if it becomes empty)
    app.querySelectorAll('.icon-btn.del').forEach(btn => {
      btn.addEventListener('click', () => {
        const entryId = btn.getAttribute('data-entry-id');
        const itemId = btn.getAttribute('data-item-id');
        const entry = ev.entries.find(en => en.id === entryId);
        if(!entry) return;
        entry.items = entry.items.filter(i => i.id !== itemId);
        if(entry.items.length === 0){
          ev.entries = ev.entries.filter(en => en.id !== entryId);
        }
        saveEvents();
        render();
      });
    });

    // delete an entire entry at once
    app.querySelectorAll('.entry-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const entryId = btn.getAttribute('data-entry-id');
        const entry = ev.entries.find(en => en.id === entryId);
        if(!entry) return;
        if(confirm(`Delete this entry (${entry.items.length} item${entry.items.length===1?'':'s'})?`)){
          ev.entries = ev.entries.filter(en => en.id !== entryId);
          saveEvents();
          render();
        }
      });
    });

    document.getElementById('deleteEventBtn').addEventListener('click', () => {
      const confirmed = confirm(`Delete "${ev.name}" and all ${itemCount} logged item(s)? This cannot be undone.`);
      if(confirmed){
        events = events.filter(e => e.id !== ev.id);
        saveEvents();
        view = 'home';
        currentEventId = null;
        render();
      }
    });
  }

  function stageRowHtml(row, idx){
    const prefix = `sr-${idx}-`;
    return `
      <div class="stage-row">
        <div class="field">
          <label>Category</label>
          <select id="${prefix}category">
            <option value="Tools" ${row.category==='Tools'?'selected':''}>Tools</option>
            <option value="Outdoor Power" ${row.category==='Outdoor Power'?'selected':''}>Outdoor Power</option>
          </select>
        </div>
        <div class="field"><label>Item name</label><input type="text" id="${prefix}name" value="${escapeAttr(row.itemName)}" placeholder="e.g. 20V cordless drill kit"></div>
        <div class="field"><label>Value ($)</label><input type="number" id="${prefix}value" value="${row.value}" min="0" step="0.01" placeholder="0.00"></div>
        <div class="promo-check">
          <input type="checkbox" id="${prefix}promo" ${row.promo ? 'checked' : ''}>
          <label for="${prefix}promo">This item was a promo</label>
        </div>
        <div class="row-btn-group">
          <button class="row-btn" id="${prefix}dup" title="Duplicate this row">Duplicate</button>
          <button class="row-btn remove" id="${prefix}remove" title="Remove row">✕</button>
        </div>
      </div>
    `;
  }

  function renderEntryTickets(entries){
    let html = '';
    let lastDate = null;
    entries.forEach(entry => {
      if(entry.date !== lastDate){
        const d = new Date(entry.date + 'T00:00:00');
        const label = d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric', year:'numeric'});
        html += `<div class="day-heading">${label}</div>`;
        lastDate = entry.date;
      }
      const entryTotal = entry.items.reduce((s,i)=>s+i.value,0);
      html += `
        <div class="ticket">
          <div class="stub-left"></div>
          <div class="stub-body">
            <div class="entry-header">
              <div>
                <div class="e-datetime mono">${fmtTime(entry.time)}</div>
                <div class="e-meta">${entry.items.length} item${entry.items.length===1?'':'s'}</div>
              </div>
              <div style="display:flex;align-items:center;gap:4px;">
                <div class="e-total mono">${fmtMoney(entryTotal)}</div>
                <button class="entry-del-btn" data-entry-id="${entry.id}" title="Delete this entry">✕</button>
              </div>
            </div>
            ${entry.items.map(item => `
              <div class="item-line ${catClass(item.category)}">
                <div class="i-left">
                  <span class="cat-pill">${item.category === 'Outdoor Power' ? 'Outdoor' : 'Tools'}</span>
                  <span class="i-name">${escapeHtml(item.itemName)}</span>
                  ${item.promo ? '<span class="promo-badge" title="Promo item">🏷️</span>' : ''}
                </div>
                <div class="i-right">
                  <div class="i-value mono">${fmtMoney(item.value)}</div>
                  <button class="icon-btn dup" data-entry-id="${entry.id}" data-item-id="${item.id}" title="Duplicate">⧉</button>
                  <button class="icon-btn del" data-entry-id="${entry.id}" data-item-id="${item.id}" title="Delete">✕</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
    return html;
  }

  function showMsg(text, isError){
    const el = document.getElementById('formMsg');
    if(!el) return;
    el.textContent = text;
    el.className = 'form-msg' + (isError ? ' error' : '');
  }

  function render(){
    if(view === 'home') renderHome();
    else renderEvent();
  }

  loadEvents();
})();
</script>


</body>
</html>
